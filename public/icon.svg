<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="512" height="512" fill="url(#bg)" rx="100"/>
  
  <!-- 地图网格 -->
  <g stroke="#3b82f6" stroke-width="2" opacity="0.3">
    <line x1="100" y1="156" x2="412" y2="156"/>
    <line x1="100" y1="256" x2="412" y2="256"/>
    <line x1="100" y1="356" x2="412" y2="356"/>
    <line x1="156" y1="100" x2="156" y2="412"/>
    <line x1="256" y1="100" x2="256" y2="412"/>
    <line x1="356" y1="100" x2="356" y2="412"/>
  </g>
  
  <!-- 中心定位点 -->
  <circle cx="256" cy="256" r="80" fill="url(#accent)" opacity="0.2"/>
  <circle cx="256" cy="256" r="40" fill="url(#accent)"/>
  
  <!-- 定位标记 -->
  <path d="M256 120 L256 180" stroke="#3b82f6" stroke-width="8" stroke-linecap="round"/>
  <path d="M256 332 L256 392" stroke="#3b82f6" stroke-width="8" stroke-linecap="round"/>
  <path d="M120 256 L180 256" stroke="#3b82f6" stroke-width="8" stroke-linecap="round"/>
  <path d="M332 256 L392 256" stroke="#3b82f6" stroke-width="8" stroke-linecap="round"/>
  
  <!-- 外环 -->
  <circle cx="256" cy="256" r="120" fill="none" stroke="#3b82f6" stroke-width="4" opacity="0.5"/>
  
  <!-- 灾害标记 -->
  <circle cx="330" cy="180" r="25" fill="#ef4444"/>
  <text x="330" y="190" text-anchor="middle" fill="white" font-size="28" font-weight="bold">!</text>
  
  <!-- 设施点 -->
  <circle cx="180" cy="330" r="15" fill="#10b981"/>
  <circle cx="330" cy="330" r="15" fill="#f59e0b"/>
</svg>
